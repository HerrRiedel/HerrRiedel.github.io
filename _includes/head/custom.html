<!-- crow easter egg -------------------------------------------------------- -->
<style>
  /* Wrap the logo anchor so we can position the crumb relative to it */
  #crow-logo {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }

  /* Wing-flap + peck sequence */
  @keyframes crow-animate {
    /* flap: rapid left-right rock, staying in place */
    0%   { transform: rotate(0deg)   translateY(0px);  }
    8%   { transform: rotate(-10deg) translateY(-2px); }
    16%  { transform: rotate(10deg)  translateY(-2px); }
    24%  { transform: rotate(-10deg) translateY(-2px); }
    32%  { transform: rotate(10deg)  translateY(-2px); }
    40%  { transform: rotate(-6deg)  translateY(-1px); }
    48%  { transform: rotate(6deg)   translateY(-1px); }
    /* settle */
    56%  { transform: rotate(0deg)   translateY(0px);  }
    /* peck: tilt forward and dip */
    66%  { transform: rotate(22deg)  translateY(5px);  }
    76%  { transform: rotate(22deg)  translateY(5px);  }
    /* lift back */
    90%  { transform: rotate(0deg)   translateY(0px);  }
    100% { transform: rotate(0deg)   translateY(0px);  }
  }

  #crow-logo.crow-eating img {
    animation: crow-animate 2.0s ease-in-out forwards;
    transform-origin: center bottom;
  }

  /* The food item that appears at the crow's feet */
  #crow-crumb {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    line-height: 1;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease-in;
    user-select: none;
  }
  #crow-crumb.visible {
    opacity: 1;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var crowLogo  = document.getElementById('crow-logo');
    var crowTitle = document.getElementById('crow-title');
    var animating = false;

    // Cycle through a small set of snacks for variety
    var snacks = ['🌾', '🫘', '🪲', '🌰'];
    var snackIdx = 0;

    function triggerCrow(e) {
      if (animating) return;
      // Only prevent navigation if we're on the home page (no-op anyway);
      // allow normal navigation after animation on other pages.
      e.preventDefault();
      animating = true;

      crowLogo.classList.add('crow-eating');

      // Spawn the crumb
      var crumb = document.createElement('span');
      crumb.id = 'crow-crumb';
      crumb.textContent = snacks[snackIdx % snacks.length];
      snackIdx++;
      crowLogo.appendChild(crumb);

      // Show crumb when crow pecks (66% of 2000ms ≈ 1320ms)
      setTimeout(function () { crumb.classList.add('visible'); }, 1280);
      // Hide it as crow lifts (76% ≈ 1520ms)
      setTimeout(function () { crumb.classList.remove('visible'); }, 1520);

      // Clean up after full animation
      setTimeout(function () {
        crowLogo.classList.remove('crow-eating');
        crumb.remove();
        animating = false;
      }, 2100);
    }

    if (crowLogo)  crowLogo.addEventListener('click',  triggerCrow);
    if (crowTitle) crowTitle.addEventListener('click', triggerCrow);
  });
</script>
