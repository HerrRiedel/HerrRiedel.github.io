<!-- crow easter egg -------------------------------------------------------- -->
<style>
  #crow-logo { position: relative; display: inline-block; cursor: pointer; }
  #crow-logo:focus:not(:focus-visible),
  #crow-title:focus:not(:focus-visible) { outline: none; }

  /* Animate the SVG crow directly — no element swapping */
  #crow-svg { transform-origin: center 84%; }

  @keyframes crow-flap {
    0%   { transform: translateY(0px)  rotate(0deg);  }
    12%  { transform: translateY(-5px) rotate(-7deg); }
    24%  { transform: translateY(-1px) rotate(4deg);  }
    36%  { transform: translateY(-6px) rotate(-8deg); }
    48%  { transform: translateY(-2px) rotate(3deg);  }
    60%  { transform: translateY(-4px) rotate(-5deg); }
    72%  { transform: translateY(-1px) rotate(2deg);  }
    86%  { transform: translateY(-2px) rotate(-1deg); }
    100% { transform: translateY(0px)  rotate(0deg);  }
  }
  @keyframes crow-peck {
    0%   { transform: rotate(0deg);  }
    35%  { transform: rotate(22deg); }
    60%  { transform: rotate(22deg); }
    100% { transform: rotate(0deg);  }
  }
  @keyframes crow-eat {
    0%   { transform: rotate(0deg);  }
    30%  { transform: rotate(18deg); }
    55%  { transform: rotate(18deg); }
    80%  { transform: rotate(-3deg); }
    100% { transform: rotate(0deg);  }
  }

  #crow-svg.crow-flapping { animation: crow-flap 1.2s ease-in-out forwards; }
  #crow-svg.crow-pecking  { animation: crow-peck 0.7s ease-in-out forwards; }
  #crow-svg.crow-eating   { animation: crow-eat  0.5s ease-in-out forwards; }

  /* Item overlaid at beak tip — beak is ~86% from left, ~28% from top of svg */
  #crow-item {
    position: absolute;
    left: 86%;
    top: 28%;
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
    overflow: visible;
  }
  #crow-item.visible { opacity: 1; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var crowLogo  = document.getElementById('crow-logo');
  var crowTitle = document.getElementById('crow-title');
  var crowSVG   = document.getElementById('crow-svg');
  if (!crowLogo || !crowSVG) return;

  /* Item overlay element */
  var itemEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  itemEl.id = 'crow-item';
  itemEl.setAttribute('width', '18');
  itemEl.setAttribute('height', '14');
  itemEl.setAttribute('viewBox', '0 0 18 14');
  itemEl.setAttribute('overflow', 'visible');
  crowLogo.appendChild(itemEl);

  var ROCK  = '<ellipse cx="7" cy="6" rx="6.5" ry="5" fill="#b5735a"/>';
  var STICK = '<line x1="0" y1="12" x2="15" y2="2" stroke="#b5735a" stroke-width="2.2" stroke-linecap="round"/>'
            + '<line x1="7" y1="7"  x2="12" y2="1" stroke="#b5735a" stroke-width="1.6" stroke-linecap="round"/>';

  var ITEMS = [ROCK, STICK];
  var itemIdx = 0;

  var IDLE = 0, ANIM = 1, HOLDING = 2;
  var state = IDLE;

  function triggerCrow(e) {
    e.preventDefault();
    if (state === ANIM)  return;
    if (state === IDLE)  startPickup();
    else                 startEating();
  }

  function startPickup() {
    state = ANIM;
    var item = ITEMS[itemIdx % ITEMS.length];
    itemIdx++;

    /* Phase 1: flap (1.2s) */
    crowSVG.classList.add('crow-flapping');
    setTimeout(function () {
      crowSVG.classList.remove('crow-flapping');

      /* Phase 2: peck (0.7s) — item appears when head returns (after 700ms) */
      crowSVG.classList.add('crow-pecking');
      setTimeout(function () {
        crowSVG.classList.remove('crow-pecking');
        itemEl.innerHTML = item;
        itemEl.classList.add('visible');
        state = HOLDING;
      }, 700);
    }, 1200);
  }

  function startEating() {
    state = ANIM;
    itemEl.classList.remove('visible');
    crowSVG.classList.add('crow-eating');
    setTimeout(function () {
      crowSVG.classList.remove('crow-eating');
      itemEl.innerHTML = '';
      state = IDLE;
    }, 500);
  }

  [crowLogo, crowTitle].forEach(function (el) {
    if (el) el.addEventListener('click', triggerCrow);
  });
});
</script>
